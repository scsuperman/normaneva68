<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading game... | MOM GAMES</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://mo.erhtu.com/">
  <link rel="stylesheet" href="prod-css/site.css">
</head>
<body>
  <main class="container">
    <div class="empty-state">
      <h2>Loading game…</h2>
      <p>If you are not redirected automatically, <a class="more-link" href="index.html">return to the homepage</a>.</p>
    </div>
  </main>
  <script>
    var title=new URLSearchParams(location.search).get("title");
    if(!title){location.replace("index.html");}
    else{
      fetch("assets/js/games.public.json").then(function(r){return r.json();}).then(function(d){
        var g=d.find(function(x){return x&&(x.title===title||x.id===title);});
        location.replace(g?("game/"+g.slug+".html"):"index.html");
      }).catch(function(){location.replace("index.html");});
    }
  </script>
</body>
</html>
